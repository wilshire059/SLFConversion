# ============================================================================
# ASHBORNE — Game Development Status
# ============================================================================
# Status values: done, partial, framework, stub, not_started
# Add "notes:" to any item to flag work needed
# Last updated: 2026-03-22
# ============================================================================

meta:
  title: "Ashborne"
  genre: Soulslike Action RPG
  engine: Unreal Engine 5.7
  setting: Post-apocalyptic sci-fi (Borderlands/Fallout aesthetic, NOT fantasy)
  map: Project Titan (8x8 km)
  target_playtime: "10-15 hours main, 20+ completionist"
  current_phase: "Phase 1.5 complete, Phase 2 in progress"

# ============================================================================
# CORE SYSTEMS
# ============================================================================
core_systems:
  combat:
    status: done
    cpp_class: CombatManagerComponent
    details: "37 variables, 28 functions — damage calc, guarding, hit reactions, death, combos"
    features:
      light_attacks: { status: done, classes: [SLFActionComboLightL, SLFActionComboLightR] }
      heavy_attacks: { status: done, class: SLFActionComboHeavy }
      dual_wield: { status: done, class: SLFActionDualWieldAttack }
      sprint_attack: { status: done, class: SLFActionSprintAttack }
      jump_attack: { status: done, class: SLFActionJumpAttack }
      guard: { status: done, classes: [SLFActionGuardStart, SLFActionGuardEnd, SLFActionGuardCancel] }
      guard_counter: { status: done, class: SLFActionGuardCounter, damage_mult: 1.8, poise_mult: 2.0, window: 0.3s }
      dodge: { status: done, class: SLFActionDodge, has_iframes: true }
      backstab: { status: done, class: SLFActionBackstab, damage_mult: 3.0 }
      execution: { status: done, class: SLFActionExecute }
      weapon_ability: { status: done, class: SLFActionWeaponAbility }
      throw_projectile: { status: done, class: SLFActionThrowProjectile }
      input_buffer: { status: done, class: InputBufferComponent, notify: ANS_InputBuffer }

  movement:
    status: done
    details: "Phase 1.5 complete — all advanced traversal"
    features:
      basic_movement: { status: done }
      sprint: { status: done, classes: [SLFActionStartSprinting, SLFActionStopSprinting] }
      jump: { status: done, class: SLFActionJump }
      double_jump: { status: done, class: SLFActionDoubleJump }
      slide: { status: done, class: SLFActionSlide, duration: 0.8s, distance: 400cm, cooldown: 1.5s }
      crouch: { status: done, class: SLFActionCrouch }
      swim: { status: done, class: SLFActionSwim }
      traversal:
        status: done
        class: SLFActionMantle
        types:
          vault: { height: "<100cm" }
          hurdle: { height: "100-150cm" }
          mantle: { height: "150-250cm" }
          climb: { height: "250-350cm" }
      grapple:
        status: done
        class: SLFActionGrapple
        range: 3000cm
        cooldown: 8s
        attack_damage: "1.5x normal, 0.25x vs boss"
      landing_reactions:
        status: done
        tiers:
          - { distance: "<300cm", reaction: light_landing }
          - { distance: "300-600cm", reaction: heavy_landing }
          - { distance: "600-1200cm", reaction: roll_landing }
          - { distance: ">1200cm", reaction: stumble_landing, fall_damage: "0.1 HP/cm above threshold" }
      ladder_climbing: { status: done, class: SLFLadderBase, component: LadderManagerComponent }

  stealth:
    status: done
    details: "Crouch + undetected = stealth mode"
    features:
      detection_reduction: { status: done, multiplier: 0.5, range: "1500cm → 750cm" }
      stealth_backstab: { status: done, damage_mult: 3.0 }
      breaking_stealth: { status: done, triggers: [stand_up, detected, non_backstab_attack] }

  stats:
    status: done
    cpp_class: StatManagerComponent
    primary_stats:
      - { name: Vigor, purpose: "Max HP multiplier" }
      - { name: Endurance, purpose: "Max stamina multiplier" }
      - { name: Mind, purpose: "Max FP multiplier" }
      - { name: Strength, purpose: "Physical attack scaling" }
      - { name: Dexterity, purpose: "Speed/bleed scaling" }
      - { name: Intelligence, purpose: "Sorcery scaling" }
      - { name: Faith, purpose: "Incantation scaling" }
      - { name: Arcane, purpose: "Special effects scaling" }
    resources: [HP, Stamina, FP, Poise]
    damage_types: [Physical, Fire, Frost, Lightning, Holy, Magic]
    resistances: [Vitality, Robustness, Immunity, Focus]
    total_stat_data_assets: 88

  inventory:
    status: done
    cpp_class: InventoryManagerComponent
    features:
      item_storage: done
      equipment_slots: done
      quick_select_wheel: { status: done, classes: [SLFActionScrollWheelLeftHand, SLFActionScrollWheelRightHand, SLFActionScrollWheelTools] }
      two_handed_stance: { status: done, classes: [SLFActionTwoHandedStanceL, SLFActionTwoHandedStanceR] }
      item_pickup: { status: done, class: SLFActionPickupItemMontage }
      flask_system: { status: done, class: SLFActionDrinkFlaskHP }

  equipment:
    status: done
    cpp_class: EquipmentManagerComponent
    features:
      weapon_swap: done
      stat_scaling: done
      animset_per_weapon: done

  status_effects:
    status: done
    cpp_class: StatusEffectManagerComponent
    effects:
      - { name: Poison, class: SLFStatusEffectPoison, type: DOT }
      - { name: Bleed, class: SLFStatusEffectBleed, type: buildup_burst }
      - { name: Burn, class: SLFStatusEffectBurn, type: DOT }
      - { name: Frostbite, class: SLFStatusEffectFrostbite, type: slow_damage }
      - { name: Madness, class: SLFStatusEffectMadness, type: sanity }
      - { name: Plague, class: SLFStatusEffectPlague, type: buildup }
      - { name: Corruption, class: SLFStatusEffectCorruption, type: corruption }

  buffs:
    status: partial
    cpp_class: BuffManagerComponent
    implemented: [SLFBuffAttackPower]
    notes: "Only 1 buff type implemented. Need defense buff, speed buff, resistance buffs"

  progression:
    status: done
    features:
      leveling: { status: done, currency: Cinders }
      save_load: { status: done, class: SaveLoadManagerComponent, slots: 10 }
      level_up_menu: { status: done, widget: W_LevelUp }
      death_currency_drop: { status: done, class: SLFDeathCurrency }

  crafting:
    status: framework
    cpp_class: SLFCraftingManager
    details: "Recipe system architecture done, ingredient/requirement logic in place"
    widgets: [W_Crafting, W_CraftingEntry, W_CraftingAction]
    notes: "No crafting recipes or materials defined yet. Need zone-specific materials (Cinder Bloom, Slag Crystal, etc.)"

