# ============================================================================
# ASHBORNE — 100 Enemy Plan with Animation Assignments
# ============================================================================
# All enemies use c3100 locomotion (idle/walk/run) and c3100 base for
# hit reacts, deaths, guard. Only attacks/heavies/dodges/specials are mixed.
#
# Attack mixing rule: each enemy uses 2-3 DIFFERENT ER sources per combo
# so consecutive attacks feel distinct (different swing directions/speeds).
#
# Status: existing = already built, new = needs pipeline run
# approved: false = needs your review, true = good to go
#
# Animation source key:
#   c3010 = Banished Knight (heavy, right→left)
#   c3400 = Grave Warden (overhead, dual-wield)
#   c4350 = Lordsworn Knight (disciplined, left→right)
#   c5830 = Messmer Soldier (thrust, spear)
#   c3970 = Beastman (feral, uppercut)
#   c4310 = Lordsworn Soldier (wide sweep, most variety)
#   c2100 = Black Knife (fast dagger flurry)
#   c3300 = Nox Priest (flowing + CASTING)
#   c3700 = Scholar (CASTING, staff)
#   c3900 = Fire Monk (CASTING + flail)
#   c4320 = Vulgar Militia (chaotic, small weapon)
#   c3450 = Misbegotten (feral beast)
#   c3800 = Cleanrot Knight (spear + holy)
#   c4290 = Bloodhound Knight (fast, teleport)
#   c3550 = Sanguine Noble (elegant rapier)
#   c3070 = Celebrant (varied, 832 anims)
#   c4050 = Kaiden Sellsword (curved sword)
#   c3850 = Marionette Soldier (ranged crossbow)
# ============================================================================

